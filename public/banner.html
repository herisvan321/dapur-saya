<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner Management API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3498db;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
        .modal-active { overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8 text-gray-800 font-sans">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Manajemen Banner</h1>
                <p class="text-gray-600 text-sm">Integrasi API Laravel Resource (Admin)</p>
            </div>
            <div id="statusBadge" class="px-3 py-1 rounded-full text-xs font-bold bg-gray-200 text-gray-600">
                Checking Server...
            </div>
        </header>

        <!-- Form Tambah Banner -->
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-8 border border-gray-200">
            <h2 class="text-xl font-bold mb-5 flex items-center">
                <svg class="w-6 h-6 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Unggah Banner Baru
            </h2>
            <form id="bannerForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-2">Teks Penawaran</label>
                        <input type="text" id="offer_text" required 
                            class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-4 focus:ring-blue-100 outline-none transition-all"
                            placeholder="Contoh: Diskon Akhir Bulan">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2">File Gambar</label>
                        <input type="file" id="image" accept="image/*" required
                            class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                    </div>
                </div>

                <button type="submit" id="submitBtn" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-200 transition-all flex items-center justify-center">
                    <span id="btnLoader" class="loader hidden"></span>
                    Simpan Banner
                </button>
            </form>
        </div>

        <!-- Notifikasi -->
        <div id="messageBox" class="hidden mb-6 p-4 rounded-xl text-sm font-bold shadow-sm animate-in fade-in duration-300 border"></div>

        <!-- Daftar Banner -->
        <div class="bg-white rounded-2xl shadow-sm p-6 border border-gray-200">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Daftar Banner Aktif</h2>
                <button onclick="fetchBanners()" class="text-blue-600 bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-xl text-sm font-bold transition-colors flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Refresh
                </button>
            </div>
            
            <div id="bannerList" class="grid grid-cols-1 md:grid-cols-2 gap-6 text-center">
                <div class="col-span-full py-20">
                    <div class="loader !w-10 !h-10 !border-t-blue-600 mb-4"></div>
                    <p class="text-gray-500">Menghubungkan ke API Laravel...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Edit -->
    <div id="editModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 class="text-xl font-bold text-gray-900">Edit Banner</h3>
                <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <form id="editForm" class="p-6 space-y-4">
                <input type="hidden" id="edit_id">
                <div>
                    <label class="block text-sm font-semibold mb-2">Teks Penawaran</label>
                    <input type="text" id="edit_offer_text" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-4 focus:ring-blue-100 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Ganti Gambar (Opsional)</label>
                    <input type="file" id="edit_image" accept="image/*"
                        class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700">
                    <p class="text-[10px] text-gray-400 mt-1">*Kosongkan jika tidak ingin mengubah gambar</p>
                </div>
                <div id="editPreviewContainer" class="hidden">
                    <p class="text-[10px] font-bold text-gray-500 mb-1 uppercase">Preview Saat Ini:</p>
                    <img id="editPreviewImg" src="" class="w-full h-32 object-cover rounded-lg border">
                </div>
                <button type="submit" id="updateBtn" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all flex items-center justify-center">
                    <span id="updateLoader" class="loader hidden"></span>
                    Update Data
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000/api/admin'; 
        const API_TOKEN = '4|OeHck1LRHgvRwLMj2WSu3fncgwgs7uZGk5fY1FCF5ad734c7';

        const bannerForm = document.getElementById('bannerForm');
        const editForm = document.getElementById('editForm');
        const messageBox = document.getElementById('messageBox');
        const bannerList = document.getElementById('bannerList');
        const statusBadge = document.getElementById('statusBadge');
        const editModal = document.getElementById('editModal');

        function showMessage(msg, isError = false) {
            messageBox.textContent = msg;
            messageBox.className = `p-4 rounded-xl text-sm font-bold mb-6 border shadow-sm ${isError ? 'bg-red-50 text-red-700 border-red-100' : 'bg-green-50 text-green-700 border-green-100'}`;
            messageBox.classList.remove('hidden');
            setTimeout(() => messageBox.classList.add('hidden'), 5000);
        }

        function closeEditModal() {
            editModal.classList.add('hidden');
            document.body.classList.remove('modal-active');
            editForm.reset();
        }

        async function fetchBanners() {
            try {
                const response = await fetch(`${API_BASE_URL}/banners`, {
                    headers: {
                        'Authorization': `Bearer ${API_TOKEN}`,
                        'Accept': 'application/json'
                    }
                });
                const result = await response.json();
                if (response.ok) {
                    statusBadge.textContent = "Online";
                    statusBadge.className = "px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-600";
                    const bannersArray = (result.data && result.data.data) ? result.data.data : [];
                    renderBanners(bannersArray);
                }
            } catch (error) {
                console.error('Fetch Error:', error);
                statusBadge.textContent = "Error";
                statusBadge.className = "px-3 py-1 rounded-full text-xs font-bold bg-red-100 text-red-600";
            }
        }

        function renderBanners(banners) {
            if (!Array.isArray(banners) || banners.length === 0) {
                bannerList.innerHTML = `<div class="col-span-full py-16 text-center border-2 border-dashed border-gray-100 rounded-3xl"><p class="text-gray-400 font-medium">Belum ada data banner.</p></div>`;
                return;
            }

            bannerList.innerHTML = banners.map(banner => {
                const displayImage = banner.image_url || 'https://via.placeholder.com/400x200?text=No+Image';
                return `
                <div class="group border border-gray-100 rounded-2xl overflow-hidden bg-white hover:shadow-xl transition-all duration-300 text-left">
                    <div class="relative h-44 bg-gray-100">
                        <img src="${displayImage}" alt="${banner.offer_text}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x200?text=Image+Not+Found'">
                        <div class="absolute top-2 right-2 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="editBanner('${banner.id}')" class="bg-blue-500 text-white p-2 rounded-lg hover:bg-blue-600 shadow-lg">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                            </button>
                            <button onclick="deleteBanner('${banner.id}')" class="bg-red-500 text-white p-2 rounded-lg hover:bg-red-600 shadow-lg">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-gray-800 text-sm h-10 overflow-hidden line-clamp-2">${banner.offer_text}</h3>
                        <div class="mt-3 pt-3 border-t border-gray-50">
                            <span class="text-[9px] font-mono text-gray-400">ID: ${banner.id.substring(0, 8)}...</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // --- Fitur Show (Edit) ---
        async function editBanner(id) {
            try {
                const response = await fetch(`${API_BASE_URL}/banners/${id}`, {
                    headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Accept': 'application/json' }
                });
                const result = await response.json();
                if (response.ok) {
                    const data = result.data;
                    document.getElementById('edit_id').value = data.id;
                    document.getElementById('edit_offer_text').value = data.offer_text;
                    
                    if (data.image_url) {
                        document.getElementById('editPreviewContainer').classList.remove('hidden');
                        document.getElementById('editPreviewImg').src = data.image_url;
                    }

                    editModal.classList.remove('hidden');
                    document.body.classList.add('modal-active');
                }
            } catch (error) {
                showMessage('Gagal mengambil data detail', true);
            }
        }

        // --- Fitur Update ---
        editForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit_id').value;
            const formData = new FormData();
            
            // Laravel PATCH/PUT dengan FormData butuh method spoofing
            formData.append('_method', 'PUT'); 
            formData.append('offer_text', document.getElementById('edit_offer_text').value);
            
            const imageFile = document.getElementById('edit_image').files[0];
            if (imageFile) {
                formData.append('image', imageFile);
            }

            const updateBtn = document.getElementById('updateBtn');
            const updateLoader = document.getElementById('updateLoader');
            
            updateBtn.disabled = true;
            updateLoader.classList.remove('hidden');

            try {
                const response = await fetch(`${API_BASE_URL}/banners/${id}`, {
                    method: 'POST', // Tetap POST karena FormData + File, dispoof via _method
                    headers: { 
                        'Authorization': `Bearer ${API_TOKEN}`,
                        'Accept': 'application/json'
                    },
                    body: formData
                });

                const result = await response.json();
                if (response.ok) {
                    showMessage('Banner berhasil diupdate');
                    closeEditModal();
                    fetchBanners();
                } else {
                    throw new Error(result.message || 'Gagal update');
                }
            } catch (error) {
                showMessage(error.message, true);
            } finally {
                updateBtn.disabled = false;
                updateLoader.classList.add('hidden');
            }
        });

        async function deleteBanner(id) {
            if (!confirm('Hapus banner ini?')) return;
            try {
                const response = await fetch(`${API_BASE_URL}/banners/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Accept': 'application/json' }
                });
                if (response.ok) { showMessage('Banner dihapus'); fetchBanners(); }
            } catch (error) { showMessage('Gagal menghapus', true); }
        }

        bannerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('image', document.getElementById('image').files[0]);
            formData.append('offer_text', document.getElementById('offer_text').value);

            const btnLoader = document.getElementById('btnLoader');
            const submitBtn = document.getElementById('submitBtn');

            btnLoader.classList.remove('hidden');
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/banners`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${API_TOKEN}`, 'Accept': 'application/json' },
                    body: formData
                });
                if (response.ok) {
                    showMessage('Berhasil diunggah!');
                    bannerForm.reset();
                    fetchBanners();
                } else {
                    const res = await response.json();
                    throw new Error(res.message || 'Gagal Simpan');
                }
            } catch (error) {
                showMessage(error.message, true);
            } finally {
                btnLoader.classList.add('hidden');
                submitBtn.disabled = false;
            }
        });

        window.onload = fetchBanners;
    </script>
</body>
</html>
