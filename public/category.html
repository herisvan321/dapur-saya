<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Category Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5 md:p-10">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">Category Manager</h1>

        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 id="formTitle" class="text-xl font-semibold mb-4 text-blue-600">Tambah Kategori Baru</h2>
            <form id="categoryForm" enctype="multipart/form-data">
                <input type="hidden" id="categoryId">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Nama Kategori</label>
                        <input type="text" id="name" name="name" required class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Icon (Gambar)</label>
                        <input type="file" id="icon" name="icon" accept="image/*" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    </div>
                </div>
                <div class="mt-4 flex gap-2">
                    <button type="submit" id="submitBtn" class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 transition">Simpan Kategori</button>
                    <button type="button" id="cancelBtn" class="hidden bg-gray-500 text-white px-6 py-2 rounded-md hover:bg-gray-600 transition">Batal</button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Icon</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nama</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Jumlah Resep</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Aksi</th>
                    </tr>
                </thead>
                <tbody id="categoryTableBody" class="bg-white divide-y divide-gray-200">
                    <tr><td colspan="4" class="p-4 text-center">Loading data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000/api/admin'; // Sesuaikan dengan URL Laravel Anda
        const TOKEN = '4|OeHck1LRHgvRwLMj2WSu3fncgwgs7uZGk5fY1FCF5ad734c7';
        
        const categoryForm = document.getElementById('categoryForm');
        const categoryTableBody = document.getElementById('categoryTableBody');
        const submitBtn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const formTitle = document.getElementById('formTitle');

        // Fetch Data
        async function fetchCategories() {
            try {
                const response = await fetch(`${API_BASE_URL}/categories`, {
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });
                const result = await response.json();
                renderTable(result.data); // result.data matches the new API response
            } catch (error) {
                console.error('Error:', error);
                alert('Gagal mengambil data');
            }
        }

        // Render ke Table
        function renderTable(categories) {
            categoryTableBody.innerHTML = '';
            categories.forEach(cat => {
                categoryTableBody.innerHTML += `
                    <tr>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <img src="${cat.icon_url || 'https://via.placeholder.com/40'}" class="h-10 w-10 rounded-full object-cover border">
                        </td>
                        <td class="px-6 py-4 font-medium text-gray-900">${cat.name}</td>
                        <td class="px-6 py-4 text-gray-500">${cat.recipes_count || 0} Resep</td>
                        <td class="px-6 py-4 text-right space-x-2">
                            <button onclick="editCategory(${cat.id}, '${cat.name}')" class="text-indigo-600 hover:text-indigo-900">Edit</button>
                            <button onclick="deleteCategory(${cat.id})" class="text-red-600 hover:text-red-900">Hapus</button>
                        </td>
                    </tr>
                `;
            });
        }

        // Simpan atau Update
        categoryForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('categoryId').value;
            const formData = new FormData(categoryForm);
            
            let url = `${API_BASE_URL}/categories`;
            
            // Jika ada ID, berarti mode Update
            if (id) {
                url += `/${id}`;
                // Laravel Resource Controller butuh spoofing PUT untuk multipart/form-data
                formData.append('_method', 'PUT');
            }

            try {
                const response = await fetch(url, {
                    method: 'POST', // Selalu POST jika kirim file
                    headers: { 'Authorization': `Bearer ${TOKEN}` },
                    body: formData
                });

                const result = await response.json();
                if (response.ok) {
                    alert(result.message);
                    resetForm();
                    fetchCategories();
                } else {
                    alert('Error: ' + JSON.stringify(result.errors || result.message));
                }
            } catch (error) {
                console.error('Error:', error);
            }
        });

        // Hapus Kategori
        async function deleteCategory(id) {
            if (!confirm('Yakin ingin menghapus kategori ini?')) return;

            try {
                const response = await fetch(`${API_BASE_URL}/categories/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });
                if (response.ok) {
                    fetchCategories();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Masuk ke Mode Edit
        function editCategory(id, name) {
            document.getElementById('categoryId').value = id;
            document.getElementById('name').value = name;
            formTitle.innerText = 'Edit Kategori';
            submitBtn.innerText = 'Update Kategori';
            cancelBtn.classList.remove('hidden');
        }

        // Reset Form
        function resetForm() {
            categoryForm.reset();
            document.getElementById('categoryId').value = '';
            formTitle.innerText = 'Tambah Kategori Baru';
            submitBtn.innerText = 'Simpan Kategori';
            cancelBtn.classList.add('hidden');
        }

        cancelBtn.addEventListener('click', resetForm);

        // Load awal
        fetchCategories();
    </script>
</body>
</html>
