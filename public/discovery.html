<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discovery Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; font-weight: 600; }
        .custom-scrollbar::-webkit-scrollbar { height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-20">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">Discovery <span class="text-blue-600">Admin</span></h1>
                <p class="text-gray-500 mt-1">Full insights into Banners, Categories, and User Trends</p>
            </div>
            <button onclick="fetchDiscoveryData()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-blue-200 transition-all active:scale-95">
                Refresh Dashboard
            </button>
        </header>

        <div id="loader" class="hidden flex flex-col items-center justify-center py-32">
            <div class="loader mb-4"></div>
            <p class="text-gray-500 font-medium">Syncing with API Console...</p>
        </div>

        <div id="content" class="space-y-16">
            
            <!-- BANNERS SECTION -->
            <section>
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center">
                        <span class="w-2 h-8 bg-blue-600 rounded-full mr-3"></span> Active Promotions
                    </h2>
                </div>
                <div id="banners-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </section>

            <!-- CATEGORIES SECTION -->
            <section>
                <h2 class="text-2xl font-bold mb-6 text-gray-800 flex items-center">
                    <span class="w-2 h-8 bg-green-500 rounded-full mr-3"></span> Browse Categories
                </h2>
                <div id="categories-list" class="flex gap-4 overflow-x-auto pb-4 custom-scrollbar"></div>
            </section>

            <!-- POPULAR ANALYTICS SECTION -->
            <section class="bg-white rounded-[32px] shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-8 border-b border-gray-50">
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center">
                        <span class="w-2 h-8 bg-orange-500 rounded-full mr-3"></span> Cooking Trends
                        <span class="ml-4 text-xs bg-orange-100 text-orange-600 px-3 py-1 rounded-full uppercase tracking-widest">Real-time Views</span>
                    </h2>
                </div>
                <div class="flex bg-gray-50/50 border-b overflow-x-auto">
                    <button id="btn-today" onclick="switchPopularTab('today')" class="tab-btn px-8 py-5 text-sm uppercase font-black tracking-widest transition-all">Today</button>
                    <button id="btn-thisWeek" onclick="switchPopularTab('thisWeek')" class="tab-btn px-8 py-5 text-sm uppercase font-black tracking-widest transition-all">This Week</button>
                    <button id="btn-thisMonth" onclick="switchPopularTab('thisMonth')" class="tab-btn px-8 py-5 text-sm uppercase font-black tracking-widest transition-all">This Month</button>
                    <button id="btn-thisYear" onclick="switchPopularTab('thisYear')" class="tab-btn px-8 py-5 text-sm uppercase font-black tracking-widest transition-all">This Year</button>
                </div>
                <div id="popular-content" class="p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 min-h-[250px] bg-white">
                </div>
            </section>

            <!-- RECIPES FEED SECTION -->
            <section>
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center">
                        <span class="w-2 h-8 bg-purple-600 rounded-full mr-3"></span> Discovery Feed
                    </h2>
                </div>
                <div id="recipes-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
            </section>

        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api/discovery';
        let popularData = {};

        async function fetchDiscoveryData() {
            toggleLoading(true);
            try {
                const response = await fetch(API_URL);
                const result = await response.json();

                if (result.status === 'success') {
                    renderBanners(result.data.banners);
                    renderCategories(result.data.categories);
                    renderRecipes(result.data.restaurants);
                    
                    popularData = result.data.popular;
                    switchPopularTab('today');
                } else {
                    alert('Error: ' + result.message);
                }
            } catch (error) {
                console.error('Fetch error:', error);
                alert('Connection failure. Check if Laravel is running.');
            } finally {
                toggleLoading(false);
            }
        }

        function toggleLoading(isLoading) {
            document.getElementById('loader').classList.toggle('hidden', !isLoading);
            document.getElementById('content').classList.toggle('hidden', isLoading);
        }

        function renderBanners(banners) {
            const container = document.getElementById('banners-list');
            if(!banners || banners.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center text-gray-400 py-10">No active promotions</p>';
                return;
            }
            container.innerHTML = banners.map(b => `
                <div class="group relative overflow-hidden rounded-[24px] aspect-[16/9] bg-gray-200 shadow-md transition-all hover:shadow-xl">
                    <img src="${b.imageUrl || 'https://via.placeholder.com/600x400'}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent flex flex-col justify-end p-6">
                        <p class="text-white font-bold text-xl leading-tight">${b.offerText || 'Special Offer'}</p>
                    </div>
                </div>
            `).join('');
        }

        function renderCategories(categories) {
            const container = document.getElementById('categories-list');
            if(!categories || categories.length === 0) {
                container.innerHTML = '<p class="text-gray-400 py-4">No categories found</p>';
                return;
            }
            container.innerHTML = categories.map(c => `
                <div class="flex-shrink-0 flex items-center bg-white border border-gray-100 pl-2 pr-6 py-2 rounded-full shadow-sm hover:shadow-md transition-all border border-transparent hover:border-blue-100 cursor-pointer group">
                    <img src="${c.iconUrl || 'https://via.placeholder.com/40'}" class="w-12 h-12 rounded-full object-cover border-2 border-white shadow-sm transition-transform group-hover:rotate-12">
                    <div class="ml-3">
                        <p class="font-bold text-gray-800 text-sm group-hover:text-blue-600 transition">${c.name}</p>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">${c.viewsCount.toLocaleString()} Views</p>
                    </div>
                </div>
            `).join('');
        }

        function renderRecipes(recipes) {
            const container = document.getElementById('recipes-list');
            if(!recipes || recipes.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center text-gray-400 py-10">No recipes found in feed</p>';
                return;
            }
            container.innerHTML = recipes.map(r => recipeCardTemplate(r)).join('');
        }

        function recipeCardTemplate(r) {
            return `
                <div class="bg-white rounded-[28px] shadow-sm border border-gray-100 overflow-hidden hover:shadow-xl transition-all duration-300 group">
                    <div class="relative h-52 overflow-hidden">
                        <img src="${r.imageUrl || 'https://via.placeholder.com/400x300'}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        <div class="absolute top-4 left-4 flex flex-col gap-2">
                            ${r.isTrending ? '<span class="bg-orange-500 text-white text-[10px] font-black px-3 py-1.5 rounded-lg shadow-lg">HOT</span>' : ''}
                            ${r.isExclusive ? '<span class="bg-blue-600 text-white text-[10px] font-black px-3 py-1.5 rounded-lg shadow-lg">PRO</span>' : ''}
                        </div>
                    </div>
                    <div class="p-6">
                        <h3 class="font-bold text-gray-900 text-lg truncate mb-1 group-hover:text-blue-600 transition-colors">${r.name}</h3>
                        <p class="text-xs text-gray-400 font-bold uppercase tracking-widest mb-4">${r.viewsCount.toLocaleString()} Views</p>
                        <div class="flex flex-wrap gap-2">
                            ${r.categories.map(cat => `<span class="text-[10px] bg-blue-50 text-blue-700 font-bold px-3 py-1 rounded-full uppercase border border-blue-100">${cat.name}</span>`).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function switchPopularTab(period) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active', 'text-blue-600'));
            document.getElementById('btn-' + period).classList.add('tab-active');

            const container = document.getElementById('popular-content');
            const data = popularData[period] || [];

            if (data.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center text-gray-400 italic">No activity detected for this period</div>`;
                return;
            }

            container.innerHTML = data.map((r, index) => `
                <div class="flex flex-col items-center bg-gray-50/50 p-6 rounded-[24px] border border-transparent hover:border-orange-100 hover:bg-orange-50/30 transition-all group">
                    <div class="relative mb-4">
                        <img src="${r.imageUrl || 'https://via.placeholder.com/150'}" class="w-24 h-24 object-cover rounded-full shadow-lg border-4 border-white group-hover:scale-105 transition-transform">
                        <span class="absolute -top-1 -right-1 w-8 h-8 bg-orange-500 text-white text-xs font-black rounded-full flex items-center justify-center border-4 border-white shadow-sm">
                            ${index + 1}
                        </span>
                    </div>
                    <div class="text-center">
                        <h4 class="font-bold text-gray-800 text-sm mb-1 group-hover:text-orange-600 transition">${r.name}</h4>
                        <div class="inline-flex items-center px-3 py-1 bg-white rounded-full shadow-sm border border-gray-100">
                            <span class="text-[10px] font-black text-orange-500">🔥 ${r.period_views.toLocaleString()}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        fetchDiscoveryData();
    </script>
</body>
</html>
